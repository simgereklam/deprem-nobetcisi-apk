name: Android APK Oluştur

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master", "ana" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Kodları al
        uses: actions/checkout@v4

      - name: Java kur
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Android SDK kur
        uses: android-actions/setup-android@v3

      - name: Gradle indir
        run: |
          curl -L https://services.gradle.org/distributions/gradle-8.10.2-bin.zip -o gradle.zip
          unzip -q gradle.zip

      - name: APK derle
        run: ./gradle-8.10.2/bin/gradle assembleDebug --no-daemon

      - name: APK dosyasını yükle
        uses: actions/upload-artifact@v4
        with:
          name: Deprem-Nobetcisi-APK
          path: app/build/outputs/apk/debug/app-debug.apk
